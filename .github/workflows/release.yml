name: release

# Cross-platform release build pipeline for the `kindling` umbrella binary
# (PORT-010). The actual cross-build lives in the reusable `_cross-build.yml`
# workflow (shared with publish.yml so the npm platform packages build the exact
# same artifacts). This workflow calls it and, on a published Release, attaches
# the archives + SHA256 sidecars to the Release.
#
# Triggers:
#   * release.published   -> build all targets + upload assets to the Release
#   * workflow_dispatch    -> build all targets (artifacts only; rehearsal)
#   * pull_request / push  -> BUILD-ONLY check (no upload), so the cross-build is
#                            validated on PRs/pushes touching the Rust crates,
#                            Cargo manifests, or the build workflows.

on:
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/release.yml'
      - '.github/workflows/_cross-build.yml'
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/release.yml'
      - '.github/workflows/_cross-build.yml'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege; the upload job opts up to `contents: write`.
permissions:
  contents: read

jobs:
  # Cross-build all 7 targets (reusable workflow). Runs for every trigger, which
  # gives the BUILD-ONLY validation on PRs/pushes.
  cross-build:
    uses: ./.github/workflows/_cross-build.yml
    permissions:
      contents: read

  # ---- Upload to GitHub Release ------------------------------------------
  # Only runs for a published release. Collects every target's archive + sidecar
  # and attaches them to the Release. This is the only job that needs write
  # access to repository contents.
  upload-release:
    name: upload release assets
    needs: cross-build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: kindling-bin-*
          merge-multiple: true
          path: dist

      - name: List assets
        run: ls -lR dist

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          fail_on_unmatched_files: true

  # ---- Homebrew tap PR (eddacraft/homebrew-tap) ---------------------------
  # Opens a PR in the shared tap (same repo that ships anvil) once release
  # assets and .sha256 sidecars are attached. Requires HOMEBREW_TAP_TOKEN: a
  # PAT or fine-grained token with contents:write on eddacraft/homebrew-tap.
  homebrew-tap-pr:
    name: open homebrew-tap PR
    needs: upload-release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kindling
        uses: actions/checkout@v4

      - name: Generate kindling formula
        run: ./scripts/generate-homebrew-formula.sh "${{ github.event.release.tag_name }}"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: eddacraft/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Copy formula into tap
        run: |
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/kindling.rb homebrew-tap/Formula/kindling.rb

      - name: Open PR in homebrew-tap
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          commit-message: 'kindling ${{ github.event.release.tag_name }}'
          title: 'kindling ${{ github.event.release.tag_name }}'
          body: |
            Automated update from [eddacraft/kindling release ${{ github.event.release.tag_name }}](https://github.com/eddacraft/kindling/releases/tag/${{ github.event.release.tag_name }}).

            Merge to publish:

            ```bash
            brew update
            brew install eddacraft/tap/kindling
            ```
          branch: kindling-${{ github.event.release.tag_name }}
          delete-branch: true
