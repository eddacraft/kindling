name: rust

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'schema/**'
      - 'scripts/sync-vendored-schema.sh'
      - 'packages/kindling/src/generated/**'
      - 'packages/kindling/schema/**'
      - 'packages/kindling/scripts/sync-types.mjs'
      # The live adapters consume the thin client and are exercised against the
      # daemon by the thin-client job.
      - 'packages/kindling-adapter-opencode/**'
      - 'packages/kindling-adapter-pocketflow/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'schema/**'
      - 'scripts/sync-vendored-schema.sh'
      - 'packages/kindling/src/generated/**'
      - 'packages/kindling/schema/**'
      - 'packages/kindling/scripts/sync-types.mjs'
      # The live adapters consume the thin client and are exercised against the
      # daemon by the thin-client job.
      - 'packages/kindling-adapter-opencode/**'
      - 'packages/kindling-adapter-pocketflow/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  ts-bindings:
    name: ts-rs bindings up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p kindling-types --features ts-rs
      - name: Fail if bindings drifted
        run: |
          if ! git diff --exit-code -- crates/kindling-types/bindings; then
            echo "::error::TypeScript bindings are out of date. Run: cargo test -p kindling-types --features ts-rs"
            exit 1
          fi

  ts-generated-copy:
    name: thin-client generated types up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      # Regenerate the ts-rs bindings, then re-run the copy pipeline that vendors
      # them (and the canonical schema) into the thin client package.
      - run: cargo test -p kindling-types --features ts-rs
      - run: node packages/kindling/scripts/sync-types.mjs
      - name: Fail if bindings or copied generated types drifted
        run: |
          if ! git diff --exit-code -- \
            crates/kindling-types/bindings \
            packages/kindling/src/generated \
            packages/kindling/schema; then
            echo "::error::Generated types are out of date. Run: cargo test -p kindling-types --features ts-rs && node packages/kindling/scripts/sync-types.mjs"
            exit 1
          fi

  vendored-schema:
    name: vendored schema up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Re-sync vendored schema copies
        run: ./scripts/sync-vendored-schema.sh
      - name: Fail if vendored schema drifted
        run: |
          if ! git diff --exit-code -- \
            crates/kindling-store/schema \
            crates/kindling-client/schema; then
            echo "::error::Vendored schema copies are out of date. A change to the canonical schema/ was not re-synced. Run: ./scripts/sync-vendored-schema.sh"
            exit 1
          fi

  build:
    name: cargo build --release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release

  # Exercises the thin TS client (@eddacraft/kindling) AND the live TS adapters
  # (opencode, pocketflow) against a REAL daemon. Their integration tests skip
  # when target/debug/kindling is absent (e.g. the TS-only `pnpm -r test`); this
  # job builds it so they actually run.
  thin-client:
    name: thin TS client + adapters vs daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p kindling --bin kindling
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build the thin client first so the adapters' workspace link resolves.
      - run: pnpm --filter @eddacraft/kindling run build
      - run: pnpm --filter @eddacraft/kindling run test
      # The adapters now consume the thin client; build + exercise them against
      # the same daemon binary.
      - run: >-
          pnpm
          --filter @eddacraft/kindling-adapter-opencode
          --filter @eddacraft/kindling-adapter-pocketflow
          run build
      - run: >-
          pnpm
          --filter @eddacraft/kindling-adapter-opencode
          --filter @eddacraft/kindling-adapter-pocketflow
          run test
