# Secret-scanning configuration.
#
# kindling is itself a secret-redaction engine
# (crates/kindling-service/src/filter/secrets.rs), so its test fixtures contain
# synthetic, realistic-looking secrets (e.g. a dummy `sk-...` OpenAI key) whose
# whole purpose is to prove the redactor catches them. GitHub's non-provider /
# "generic" secret scanning flags these every time the fixtures change. They are
# NOT real credentials — there is nothing to rotate.
#
# Scope is intentionally narrow: only the redaction-engine fixture directory.
# Push protection and scanning still cover the rest of the repo, so a real secret
# accidentally committed anywhere else is still caught.
paths-ignore:
  - 'crates/kindling-service/tests/fixtures/**'
