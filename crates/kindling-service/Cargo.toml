[package]
name = "kindling-service"
description = "In-process Kindling orchestration API — open/close capsule, append observation, retrieve, pin, unpin. Used by the daemon and by direct Rust consumers (Anvil, headless workflows)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
kindling-types = { path = "../kindling-types" }
kindling-store = { path = "../kindling-store" }
kindling-provider = { path = "../kindling-provider" }
kindling-filter = { path = "../kindling-filter" }
thiserror = "2"
serde_json = "1"
uuid = { version = "1", features = ["v4"] }

[lints]
workspace = true
